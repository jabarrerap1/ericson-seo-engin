[build]
  functions = "netlify/functions"
  command = "npm install"
  publish = "public"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/sitemap.xml"
  to = "/.netlify/functions/sitemap"
  status = 200

[[redirects]]
  from = "/robots.txt"
  to = "/.netlify/functions/robots"
  status = 200

[[redirects]]
  from = "/"
  to = "/blog"
  status = 302

[[redirects]]
  from = "/blog"
  to = "/.netlify/functions/blog-index"
  status = 200

[[redirects]]
  from = "/blog/:slug"
  to = "/.netlify/functions/blog-post"
  status = 200
